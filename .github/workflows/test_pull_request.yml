name: Test pull request
on:
  pull_request:
  merge_group:

jobs:
  lint:
    permissions:
      contents: read
    name: lint.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Run lint.sh
        run: ./deploy-scripts/lint.sh

  build:
    permissions:
      contents: read
    name: build.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Run build.sh
        run: ./deploy-scripts/build.sh

      - name: Save Docker image
        run: docker save "ludos-$GITHUB_SHA" | gzip > /tmp/ludos-image.tar.gz

      - name: Upload Docker image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ludos-docker-image
          path: /tmp/ludos-image.tar.gz
          retention-days: 1

  test:
    needs: [lint, build]
    permissions:
      id-token: write
      contents: read
      packages: write
    name: test.sh
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Download Docker image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ludos-docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/ludos-image.tar.gz

      - name: Run test.sh
        run: ./deploy-scripts/test.sh
        env:
          LUDOS_PALVELUKAYTTAJA_USERNAME: ${{ secrets.LUDOS_PALVELUKAYTTAJA_USERNAME }}
          LUDOS_PALVELUKAYTTAJA_PASSWORD: ${{ secrets.LUDOS_PALVELUKAYTTAJA_PASSWORD }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright/playwright-results/
          retention-days: 30
